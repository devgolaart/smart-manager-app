<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devide App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
</head>
<body>

    <!-- SIDEBAR NAVIGATION MENU -->
    <div id="sidebarMenu" class="sidebar">
        <div class="sidebar-header">
            <h2 style="color: #fff; font-size: 22px; font-weight: 600; margin: 0;">Devide</h2>
            <span class="close-sidebar-btn" onclick="toggleSidebar()">&times;</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
        <div class="sidebar-links">
            <a href="#" onclick="handleSidebarAction('recent')"><span class="icon">🕒</span> Recent</a>
            <a href="#" onclick="handleSidebarAction('uploads')"><span class="icon">📤</span> Uploads</a>
            <a href="#" onclick="handleSidebarAction('offline')"><span class="icon">💾</span> Offline</a>
            <a href="#" onclick="handleSidebarAction('bin')"><span class="icon">🗑️</span> Bin</a>
            <a href="#" onclick="handleSidebarAction('spam')"><span class="icon">⚠️</span> Spam</a>
            <a href="#" onclick="handleSidebarAction('settings')"><span class="icon">⚙️</span> Settings</a>
            <a href="#" onclick="handleSidebarAction('help')"><span class="icon">❓</span> Help and feedback</a>
        </div>
        
        <!-- STORAGE INDICATOR BAR -->
        <div class="storage-section">
            <div style="display: flex; align-items: center; margin-bottom: 5px; font-size: 13px; color: #aaa;">
                <span style="margin-right: 8px;">☁️</span> Storage
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill"></div>
            </div>
            <p class="storage-text">0.1 GB of 15 GB used</p>
            <button class="get-storage-btn">Get more storage</button>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <header>
        <div class="menu-trigger-btn" onclick="toggleSidebar()">&#9776;</div>
        <h1>Devide</h1>
        <p>Your AI-Powered Free Storage</p>
    </header>

    <main class="container">
        <!-- Search Bar -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search photos, faces, or docs...">
            <button id="voiceBtn" class="btn-icon">🎤</button>
        </div>

        <!-- Category Tabs -->
        <div class="categories">
            <button class="tab-btn active" onclick="filterCategory('all')">All</button>
            <button class="tab-btn" onclick="filterCategory('photo')">Photos</button>
            <button class="tab-btn" onclick="filterCategory('doc')">Documents</button>
        </div>

        <!-- Gallery / File Display Grid -->
        <div class="media-grid" id="mediaGrid">
            <p class="empty-msg">No files uploaded yet. Click plus to add!</p>
        </div>
    </main>

    <!-- FLOATING ACTION BUTTON SYSTEM (DRIVE STYLE) -->
    <div class="fab-container">
        <div id="fabOverlay" class="fab-overlay" onclick="toggleFabMenu()"></div>

        <div id="fabOptions" class="fab-options">
            <div class="fab-option-item" onclick="handleFabAction('slides')">
                <span class="fab-label">Google Slides</span>
                <div class="fab-sub-icon style-slides">📊</div>
            </div>
            <div class="fab-option-item" onclick="handleFabAction('sheets')">
                <span class="fab-label">Google Sheets</span>
                <div class="fab-sub-icon style-sheets">💚</div>
            </div>
            <div class="fab-option-item" onclick="handleFabAction('docs')">
                <span class="fab-label">Google Docs</span>
                <div class="fab-sub-icon style-docs">💙</div>
            </div>
            <div class="fab-option-item" onclick="handleFabAction('scan')">
                <span class="fab-label">Scan</span>
                <div class="fab-sub-icon style-scan">📷</div>
            </div>
            <label for="fileUpload" class="fab-option-item" style="margin: 0; cursor: pointer;" onclick="toggleFabMenu()">
                <span class="fab-label">Upload</span>
                <div class="fab-sub-icon style-upload">📤</div>
            </label>
            <div class="fab-option-item" onclick="handleFabAction('folder')">
                <span class="fab-label">Folder</span>
                <div class="fab-sub-icon style-folder">📁</div>
            </div>
        </div>

        <button id="mainFabBtn" class="fab-main-btn" onclick="toggleFabMenu()">➕</button>
        <input type="file" id="fileUpload" accept="image/*, application/pdf" style="display: none;" multiple>
    </div>

    <script src="app.js"></script>
</body>
</html>
